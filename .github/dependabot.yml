version: 2
updates:
  # Maintain dependencies for GitHub Actions
  - package-ecosystem: "github-actions"
    directories:
      - "/"
      - "/github/shared-workflows/docker-image-build-publish"
      - "/github/shared-workflows/gate"
      - "/github/shared-workflows/goreleaser"
      - "/github/shared-workflows/pre-commit"
    schedule:
      interval: "monthly"
      day: "friday"
      time: "00:30"
    target-branch: "main"
    cooldown:
      default-days: 10
    assignees:
      - "hibare"
    groups:
      actions:
        patterns:
          - "*"
