name: gate
description: >
  Exchange a GitHub OIDC token for a short-lived GitHub App installation token
  via a GATE server. Optionally connects via Tailscale if the GATE server is on a private tailnet.

inputs:
  gate-server-url:
    description: Base URL of the GATE server
    required: true

  target-repository:
    description: Target repository in owner/repo format (e.g. octocat/hello-world).
    required: true

  policy-name:
    description: Optional policy name to match against trust policies.
    required: false
    default: ""

  requested-permissions:
    description: >
      Optional JSON object of requested GitHub permissions (e.g.
      '{"contents":"read","issues":"write"}'). Each value must be "none",
      "read", or "write".
    required: false
    default: ""

  requested-ttl:
    description: Optional requested token lifetime in seconds.
    required: false
    default: ""

  # Tailscale inputs
  tailscale-enabled:
    description: Whether to connect via Tailscale before calling GATE
    required: false
    default: "false"

  tailscale-tags:
    description: Tailscale tags to apply (e.g. tag:ci)
    required: false
    default: "tag:ci"

outputs:
  token:
    description: Exchanged GitHub App installation token.
    value: ${{ steps.exchange.outputs.token }}

  expires-at:
    description: ISO 8601 timestamp of when the token expires.
    value: ${{ steps.exchange.outputs.expires_at }}

  matched-policy:
    description: Name of the policy that authorised the exchange.
    value: ${{ steps.exchange.outputs.matched_policy }}

  permissions:
    description: JSON object mapping granted permission names to their levels.
    value: ${{ steps.exchange.outputs.permissions }}

  request-id:
    description: Request identifier from the GATE server for audit correlation.
    value: ${{ steps.exchange.outputs.request_id }}

runs:
  using: composite
  steps:
    - name: Connect to Tailscale
      if: ${{ inputs.tailscale-enabled == 'true' }}
      uses: tailscale/github-action@780049a30b6ff5c378a9e7b389d15ece7a204888 # v4.1.3
      env:
        TS_OAUTH_CLIENT_ID: ${{ env.TS_OAUTH_CLIENT_ID }}
        TS_OAUTH_SECRET: ${{ env.TS_OAUTH_SECRET }}
      with:
        oauth-client-id: ${{ env.TS_OAUTH_CLIENT_ID }}
        oauth-secret: ${{ env.TS_OAUTH_SECRET }}
        tags: ${{ inputs.tailscale-tags }}
        use-cache: true

    - name: Fetch OIDC token from GitHub
      id: fetch-oidc
      shell: bash
      env:
        ACTIONS_ID_TOKEN_REQUEST_TOKEN: ${{ env.ACTIONS_ID_TOKEN_REQUEST_TOKEN }}
        ACTIONS_ID_TOKEN_REQUEST_URL: ${{ env.ACTIONS_ID_TOKEN_REQUEST_URL }}
      run: |
        set -euo pipefail

        if [ -z "${ACTIONS_ID_TOKEN_REQUEST_TOKEN:-}" ] || [ -z "${ACTIONS_ID_TOKEN_REQUEST_URL:-}" ]; then
          echo "::error title=Missing OIDC token::This action requires ambient GitHub OIDC"
          echo "       credentials. Ensure the workflow has \`id-token: write\` permissions."
          exit 1
        fi

        OIDC_TOKEN=$(curl -sS -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
          "${ACTIONS_ID_TOKEN_REQUEST_URL}&audience=gate" | jq -r '.value')

        if [ -z "$OIDC_TOKEN" ] || [ "$OIDC_TOKEN" = "null" ]; then
          echo "::error title=OIDC fetch failed::Failed to retrieve OIDC token from GitHub."
          exit 1
        fi

        # Pass via environment variable (no masking to avoid *** in payload)
        echo "OIDC_TOKEN=$OIDC_TOKEN" >> "$GITHUB_ENV"

    - name: Build request payload
      id: payload
      shell: bash
      env:
        POLICY_NAME: ${{ inputs.policy-name }}
        REQUESTED_PERMISSIONS: ${{ inputs.requested-permissions }}
        REQUESTED_TTL: ${{ inputs.requested-ttl }}
        OIDC_TOKEN: ${{ env.OIDC_TOKEN }}
      run: |
        set -euo pipefail

        PAYLOAD=$(jq -n \
          --arg oidc_token "$OIDC_TOKEN" \
          --arg target_repo "${{ inputs.target-repository }}" \
          '{oidc_token: $oidc_token, target_repository: $target_repo}')

        if [ -n "$POLICY_NAME" ]; then
          PAYLOAD=$(echo "$PAYLOAD" | jq --arg v "$POLICY_NAME" '.policy_name = $v')
        fi

        if [ -n "$REQUESTED_PERMISSIONS" ]; then
          if ! jq empty <<< "$REQUESTED_PERMISSIONS" >/dev/null 2>&1; then
            echo "::error title=Invalid permissions::requested-permissions must be valid JSON"
            exit 1
          fi
          PAYLOAD=$(echo "$PAYLOAD" | jq --argjson v "$REQUESTED_PERMISSIONS" '.requested_permissions = $v')
        fi

        if [ -n "$REQUESTED_TTL" ]; then
          PAYLOAD=$(echo "$PAYLOAD" | jq --argjson v "$REQUESTED_TTL" '.requested_ttl = $v')
        fi

        echo "payload=$PAYLOAD" >> "$GITHUB_OUTPUT"

    - name: Exchange token
      id: exchange
      shell: bash
      env:
        GATE_SERVER_URL: ${{ inputs.gate-server-url }}
        REQUEST_PAYLOAD: ${{ steps.payload.outputs.payload }}
      run: |
        set -euo pipefail

        SERVER_URL="${GATE_SERVER_URL%/}"
        ENDPOINT="${SERVER_URL}/api/v1/exchange"

        RESPONSE=$(mktemp)
        HTTP_CODE=$(curl -sS -w '%{http_code}' -o "$RESPONSE" \
          "$ENDPOINT" \
          -H 'Content-Type: application/json' \
          -d "$REQUEST_PAYLOAD")

        if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
          echo "token=$(jq -r '.token' "$RESPONSE")" >> "$GITHUB_OUTPUT"
          echo "expires_at=$(jq -r '.expires_at' "$RESPONSE")" >> "$GITHUB_OUTPUT"
          echo "matched_policy=$(jq -r '.matched_policy' "$RESPONSE")" >> "$GITHUB_OUTPUT"
          echo "permissions=$(jq -c '.permissions' "$RESPONSE")" >> "$GITHUB_OUTPUT"
          echo "request_id=$(jq -r '.request_id' "$RESPONSE")" >> "$GITHUB_OUTPUT"
        else
          ERROR_CODE=$(jq -r '.error_code // "unknown"' "$RESPONSE" 2>/dev/null || echo "unknown")
          ERROR_MSG=$(jq -r '.error // "No error message"' "$RESPONSE" 2>/dev/null || echo "HTTP ${HTTP_CODE}")
          echo "::error title=Token exchange failed (HTTP ${HTTP_CODE})::${ERROR_CODE}: ${ERROR_MSG}"
          exit 1
        fi
